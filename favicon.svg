<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="12" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4299e1" />
            <stop offset="100%" stop-color="#3182ce" />
        </linearGradient>
    </defs>
    
    <!-- Outer Key Base (Keyboard Switch Base) -->
    <rect x="40" y="60" width="432" height="410" rx="60" fill="#1a202c" stroke="url(#grad)" stroke-width="16" />
    
    <!-- Inner Key Top (3D effect) -->
    <path d="M 80 100 C 80 80, 100 60, 120 60 L 392 60 C 412 60, 432 80, 432 100 L 432 350 C 432 370, 412 390, 392 390 L 120 390 C 100 390, 80 370, 80 350 Z" fill="#2d3748" />
    
    <!-- Glowing Letter T -->
    <path d="M 170 170 H 342 V 215 H 280 V 310 H 232 V 215 H 170 Z" fill="#63b3ed" filter="url(#glow)" />
    
    <!-- RGB Gaming Accent line -->
    <rect x="210" y="345" width="92" height="12" rx="6" fill="#48bb78" filter="url(#glow)" />
</svg>