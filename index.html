<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Touch Typing Trainer</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>
                <img src="favicon.svg" alt="Logo" class="logo-icon">
                Touch Typing Trainer
            </h1>
            <div class="home-row-guide">Place your fingers on F and J</div>
        </header>

        <div class="main-content">
            <aside class="stats-panel">
                <h2>Statistics</h2>
                <div class="stat-box">
                    <span class="stat-label">WPM</span>
                    <span id="wpm">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Best WPM</span>
                    <span id="best-wpm">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Combo</span>
                    <span id="combo" class="combo-text">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Accuracy</span>
                    <span id="accuracy">100%</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Mistakes</span>
                    <span id="mistakes">0</span>
                </div>
                
                <div class="lesson-selector">
                    <label for="lesson-select">Lesson:</label>
                    <select id="lesson-select">
                        <option value="1">Lesson 1: F J</option>
                        <option value="2">Lesson 2: F J D K</option>
                        <option value="3">Lesson 3: Home Row</option>
                        <option value="4">Lesson 4: Real Words</option>
                        <option value="5">Lesson 5: Full Sentences</option>
                        <option value="6">Lesson 6: Numbers & Symbols</option>
                        <option value="7">Lesson 7: Code (JavaScript)</option>
                    </select>
                </div>
                <button id="restart-btn">Restart Lesson</button>
                <button id="heatmap-btn" class="secondary-btn">Show Error Heatmap</button>
                
                <div class="settings-panel">
                    <h3>Settings</h3>
                    <div class="toggle-group">
                        <label>Dark Mode</label>
                        <button id="theme-toggle" class="icon-btn">🌙</button>
                    </div>
                    <div class="toggle-group">
                        <label>Sound</label>
                        <button id="sound-toggle" class="icon-btn">🔇</button>
                    </div>
                </div>
            </aside>

            <section class="typing-area">
                <div class="progress-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <div id="text-display" class="text-display"></div>
                <div id="keyboard" class="keyboard"></div>
            </section>
        </div>
    </div>

    <!-- Modal for Lesson Completion -->
    <div id="completion-modal" class="modal-overlay">
        <div class="modal-content">
            <h2>🎉 Lesson Completed! 🎉</h2>
            <div class="modal-stats">
                <div class="modal-stat-box">
                    <span class="modal-stat-label">Speed</span>
                    <span id="modal-wpm" class="modal-stat-value">0 WPM</span>
                </div>
                <div class="modal-stat-box">
                    <span class="modal-stat-label">Accuracy</span>
                    <span id="modal-acc" class="modal-stat-value">100%</span>
                </div>
                <div class="modal-stat-box">
                    <span class="modal-stat-label">Mistakes</span>
                    <span id="modal-mistakes" class="modal-stat-value">0</span>
                </div>
            </div>
            <button id="next-lesson-btn" class="modal-btn primary-btn">Next Lesson</button>
            <button id="retry-lesson-btn" class="modal-btn secondary-btn">Retry</button>
        </div>
    </div>

    <!-- Canvas for Confetti -->
    <canvas id="confetti-canvas"></canvas>

    <script src="keyboard.js"></script>
    <script src="lessons.js"></script>
    <script src="confetti.js"></script>
    <script src="audio.js"></script>
    <script src="script.js"></script>
</body>
</html>
